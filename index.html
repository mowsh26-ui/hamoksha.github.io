<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>١٤٢٧ه‍|𝑯𝒂𝑴𝒐𝑲𝒔𝑯𝒂♡𓅓</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo',sans-serif;
  background:url("https://i.ibb.co/FbWy83Km/IMG-20250418-WA0031.jpg") center/cover no-repeat fixed;
  min-height:100vh;
  color:#fff;
  direction:rtl;
}

.overlay{
  background:rgba(0,0,0,0.35);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  max-width:420px;
  width:100%;
  text-align:center;
  padding:30px 20px;
}

.profile-pic{
  width:150px;
  height:150px;
  border-radius:50%;
  border:3px solid #fff;
  object-fit:cover;
  cursor:pointer;
}

.name{
  font-size:32px;
  margin:20px 0 10px;
  min-height:45px;
}

.bio{
  font-size:18px;
  margin-bottom:25px;
}

.links{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.links a{
  text-decoration:none;
  color:#fff;
  background:rgba(255,255,255,0.08);
  padding:14px;
  border-radius:14px;
  font-size:18px;
  transition:0.3s;
  text-align:center;
}

.links a:hover{
  background:rgba(255,255,255,0.18);
}

.links i{
  margin-right:8px;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="container">

    <img src="https://i.ibb.co/FbWy83Km/IMG-20250418-WA0031.jpg" class="profile-pic" onclick="openImg()">

    <div class="name" id="typeName"></div>

    <div class="bio">
      كن قوياً كطبيب، يجري عملية جراحية لمعلم قال له ذات يوم انت فاشل 💪🏻❤️‍
    </div>

    <div class="links">

      <a href="https://www.facebook.com/share/1FHAZF2aZN/" target="_blank">
        فيسبوك <i class="fab fa-facebook-f"></i>
      </a>

      <a href="https://www.instagram.com/mo.wael.sh?igsh=MXNmNWk4djNtZzVrMQ==" target="_blank">
        إنستجرام <i class="fab fa-instagram"></i>
      </a>

      <a href="https://t.me/Y_T5U" target="_blank">
        تيليجرام <i class="fab fa-telegram-plane"></i>
      </a>

      <a href="https://wa.me/201505030407?text=%D8%AD%D9%85%D9%88%D9%83%D8%B4%D9%87%E2%9C%A8%E2%99%A5" target="_blank">
        واتساب <i class="fab fa-whatsapp"></i>
      </a>

      <a href="https://h7mksha.sarhne.com" target="_blank">
        صارحني <i class="fa-regular fa-envelope"></i>
      </a>

    </div>

  </div>
</div>

<div class="modal" id="imgModal" onclick="closeImg()">
  <img src="https://i.ibb.co/FbWy83Km/IMG-20250418-WA0031.jpg">
</div>

<script>

const text = "١٤٢٧ه‍|𝑯𝒂𝑴𝒐𝑲𝒔𝑯𝒂♡𓅓";
let i = 0;

function typeEffect(){
  if(i < text.length){
    document.getElementById("typeName").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect,120);
  }
}

typeEffect();

function openImg(){
  document.getElementById("imgModal").style.display="flex";
}

function closeImg(){
  document.getElementById("imgModal").style.display="none";
}

</script>

</body>
</html>
